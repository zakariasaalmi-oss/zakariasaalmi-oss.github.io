<!DOCTYPE html>
<html lang="ar" dir="rtl" id="html-root">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Salmi</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&family=JetBrains+Mono:wght@400;700&family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════════
   TOKENS — Warm Cream + Deep Indigo
══════════════════════════════════════════ */
:root {
  --cream:    #EDE8DE;
  --cream2:   #E4DDD0;
  --cream3:   #D8D0C2;
  --ink:      #1C1F2E;
  --ink2:     #3A3F52;
  --ink3:     #7B82A0;
  --topbar:   #1C1F2E;
  --blue:     #2B4ECC;
  --blue-l:   #4B6EEC;
  --gold:     #C8860A;
  --gold-l:   #E8A020;
  --teal:     #0B8C78;
  --teal-l:   #12B898;
  --rose:     #C83050;
  --rose-l:   #E84070;
  --violet:   #6B30CC;
  --violet-l: #8B50EC;
  --green:    #1A8C4A;
  --green-l:  #28B860;
  --card:     #F5F0E8;
  --card2:    #EDE8DE;
  --border:   #C8C0B0;
  --shadow:   0 4px 20px rgba(28,31,46,.12);
  --shadow-md:0 8px 32px rgba(28,31,46,.18);
  --shadow-lg:0 16px 48px rgba(28,31,46,.22);
  --r:        20px;
  --r-sm:     12px;
  /* accent bg tints (light) */
  --blue-bg:  #EEF1FF;
  --gold-bg:  #FFF5E0;
  --teal-bg:  #E0F5F1;
  --rose-bg:  #FFEBEF;
  --violet-bg:#F2EEFF;
  --green-bg: #E4F7EC;
}
/* ── DARK MODE ── */
body.dark {
  --cream:    #0F1017;
  --cream2:   #161820;
  --cream3:   #1E2130;
  --ink:      #E8EAF0;
  --ink2:     #B0B8CC;
  --ink3:     #6A7490;
  --topbar:   #0D0F18;
  --card:     #161820;
  --card2:    #1A1D28;
  --border:   #2A2E42;
  --shadow:   0 4px 20px rgba(0,0,0,.4);
  --shadow-md:0 8px 32px rgba(0,0,0,.5);
  --shadow-lg:0 16px 48px rgba(0,0,0,.6);
  --blue-bg:  #1A2244;
  --gold-bg:  #2A2010;
  --teal-bg:  #0E2822;
  --rose-bg:  #2A1018;
  --violet-bg:#1E1440;
  --green-bg: #0E2818;
}
/* font-family switch per lang */
body.lang-en, body.lang-fr { font-family: 'Poppins', sans-serif; }
body.lang-ar { font-family: 'Tajawal', sans-serif; }
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 15px; }
body {
  font-family: 'Tajawal', sans-serif;
  background: var(--cream);
  color: var(--ink);
  min-height: 100vh;
  overflow-x: hidden;
  transition: background .3s, color .3s;
}
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: var(--cream2); }
::-webkit-scrollbar-thumb { background: var(--cream3); border-radius: 2px; }

/* ══════════════════════════════════════════
   AUTH SCREEN
══════════════════════════════════════════ */
#auth-screen {
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  padding: 24px;
  background:
    radial-gradient(ellipse 50% 40% at 70% 10%, #2B4ECC18, transparent),
    radial-gradient(ellipse 40% 50% at 10% 80%, #C8860A12, transparent),
    var(--cream);
}
.auth-wrap { width: 100%; max-width: 380px; }
.auth-logo { text-align: center; margin-bottom: 32px; }
.auth-logo-icon {
  width: 80px; height: 80px; border-radius: 22px;
  background: var(--ink);
  display: inline-flex; align-items: center; justify-content: center;
  margin-bottom: 14px;
  box-shadow: var(--shadow-md);
  animation: auth-float 3s ease-in-out infinite;
}
.auth-logo-icon svg { width: 44px; height: 44px; }
@keyframes auth-float {
  0%,100% { transform: translateY(0) rotate(0deg); }
  50%      { transform: translateY(-8px) rotate(-2deg); }
}
.auth-logo h1 { font-size: 2rem; font-weight: 900; letter-spacing: -1px; color: var(--ink); }
.auth-logo h1 em { font-style: normal; color: var(--blue); }
.auth-logo p { color: var(--ink3); font-size: .88rem; margin-top: 4px; }

.auth-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 28px 28px 24px;
  box-shadow: var(--shadow-lg);
}
.auth-card h2 { font-size: 1.25rem; font-weight: 800; margin-bottom: 20px; color: var(--ink); }
.f-group { margin-bottom: 14px; }
.f-group label { display: block; font-size: .8rem; color: var(--ink3); font-weight: 700; margin-bottom: 5px; letter-spacing: .3px; }
.f-wrap {
  display: flex; align-items: center; gap: 8px;
  background: var(--cream); border: 1.5px solid var(--border);
  border-radius: var(--r-sm); padding: 0 13px;
  transition: border-color .2s, box-shadow .2s;
}
.f-wrap:focus-within { border-color: var(--blue); box-shadow: 0 0 0 3px #2B4ECC22; }
.f-wrap input {
  flex: 1; background: transparent; border: none; outline: none;
  color: var(--ink); font-size: .92rem; padding: 12px 0;
  font-family: 'Tajawal', sans-serif;
}
.f-wrap input::placeholder { color: var(--ink3); }
.f-wrap .fi { color: var(--ink3); font-size: 1rem; flex-shrink: 0; }
.eye-btn { background: none; border: none; color: var(--ink3); cursor: pointer; font-size: .9rem; padding: 2px; }
.auth-msg { font-size: .82rem; text-align: center; margin: 8px 0; min-height: 1em; }
.auth-msg.err { color: var(--rose); }
.auth-msg.ok  { color: var(--green); }

.btn-main {
  width: 100%; padding: 13px; border-radius: var(--r-sm);
  background: var(--ink); color: #fff;
  font-size: .95rem; font-weight: 800; font-family: 'Tajawal', sans-serif;
  border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  box-shadow: 0 4px 16px rgba(28,31,46,.3);
  transition: all .2s; margin-top: 4px;
}
.btn-main:hover { background: var(--blue); transform: translateY(-2px); box-shadow: 0 8px 24px #2B4ECC44; }
.link-btn {
  background: none; border: none; color: var(--blue);
  font-size: .88rem; font-weight: 700; cursor: pointer;
  width: 100%; text-align: center; margin-top: 12px;
  font-family: 'Tajawal', sans-serif; padding: 4px;
  transition: opacity .2s;
}
.link-btn:hover { opacity: .75; }

/* ══════════════════════════════════════════
   MAIN APP
══════════════════════════════════════════ */
#main-app { display: none; flex-direction: column; min-height: 100vh; }

/* topbar */
.topbar {
  position: sticky; top: 0; z-index: 200;
  background: var(--topbar);
  padding: 0 14px;
  height: 64px;
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  transition: background .3s;
}
.tb-left {
  display: flex; align-items: center; gap: 6px;
  justify-content: flex-start;
}
.tb-center {
  display: flex; align-items: center; justify-content: center;
}
.tb-right {
  display: flex; align-items: center; gap: 6px;
  justify-content: flex-end;
}
.tb-btn {
  width: 38px; height: 38px; border-radius: 11px;
  background: rgba(255,255,255,.1); border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-size: 1rem; transition: background .2s;
  flex-shrink: 0;
}
.tb-btn:hover { background: rgba(255,255,255,.22); }
/* back button hidden by default */
#tb-back { display: none; }
#tb-back.visible { display: flex; }
.topbar-logo {
  display: flex; align-items: center; gap: 8px;
}
.topbar-logo-icon {
  width: 32px; height: 32px; border-radius: 9px;
  background: rgba(255,255,255,.15);
  display: flex; align-items: center; justify-content: center;
}
.topbar-logo-icon svg { width: 18px; height: 18px; }
.topbar h1 {
  color: #fff; font-size: 1.22rem; font-weight: 900;
  letter-spacing: .5px; white-space: nowrap;
}
.n-badge {
  position: absolute; top: -3px; right: -3px;
  width: 15px; height: 15px; border-radius: 50%;
  background: var(--rose-l); font-size: .6rem; font-weight: 800;
  color: #fff; display: none; align-items: center; justify-content: center;
  border: 2px solid var(--topbar);
}
.notif-btn { position: relative; }

/* breadcrumb — now inside topbar space, shown below bar */
.breadcrumb {
  display: none; align-items: center; gap: 6px;
  padding: 7px 16px 0;
  background: var(--cream); border-bottom: 1px solid var(--border);
}
.breadcrumb.visible { display: flex; }
.bc-back {
  background: none; border: none; cursor: pointer;
  color: var(--blue); font-size: .82rem; font-weight: 700;
  display: flex; align-items: center; gap: 4px;
  font-family: inherit; padding: 4px 0;
}
.bc-sep { color: var(--ink3); font-size: .75rem; }
.bc-cur { color: var(--ink); font-size: .82rem; font-weight: 700; }

/* main content */
.main-content { flex: 1; padding: 16px 14px 30px; }

/* ══════════════════════════════════════════
   HOME GRID — ICON TILES
══════════════════════════════════════════ */
#home-screen { display: block; }

.home-header { margin-bottom: 20px; }
.home-greeting { color: var(--ink3); font-size: .82rem; font-weight: 600; }
.home-name { font-size: 1.6rem; font-weight: 900; color: var(--ink); margin: 2px 0; }
.home-date { color: var(--ink3); font-size: .78rem; }

/* quick strip */
.quick-strip {
  display: flex; gap: 8px; overflow-x: auto;
  padding-bottom: 4px; margin-bottom: 20px;
  scrollbar-width: none;
}
.quick-strip::-webkit-scrollbar { display: none; }
.qs-item {
  flex-shrink: 0;
  display: flex; align-items: center; gap: 6px;
  background: var(--card); border: 1.5px solid var(--border);
  border-radius: 30px; padding: 7px 14px;
  cursor: pointer; transition: all .2s;
  font-size: .8rem; font-weight: 700; color: var(--ink2);
  font-family: 'Tajawal', sans-serif;
}
.qs-item:hover { background: var(--ink); color: #fff; border-color: var(--ink); }
.qs-icon { font-size: .95rem; }

/* icon grid */
.icon-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
}
.tile {
  background: var(--card);
  border: 1.5px solid var(--border);
  border-radius: 22px;
  padding: 22px 16px 18px;
  cursor: pointer;
  display: flex; flex-direction: column; align-items: center;
  gap: 12px; text-align: center;
  transition: all .25s;
  box-shadow: var(--shadow);
  position: relative; overflow: hidden;
}
.tile::before {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,.6) 0%, transparent 60%);
  border-radius: 22px;
  pointer-events: none;
}
.tile:hover {
  transform: translateY(-4px) scale(1.02);
  box-shadow: var(--shadow-lg);
  border-color: transparent;
}
.tile:active { transform: scale(.97); }

.tile-icon-wrap {
  width: 72px; height: 72px; border-radius: 20px;
  display: flex; align-items: center; justify-content: center;
  position: relative;
}
.tile-icon-wrap svg { width: 40px; height: 40px; }
.tile-label { font-size: .9rem; font-weight: 800; color: var(--ink); }
.tile-sub   { font-size: .72rem; color: var(--ink3); margin-top: -6px; }

/* tile colour themes */
.tile-blue   { --tc: #2B4ECC; --tcl: #EEF1FF; }
.tile-gold   { --tc: #C8860A; --tcl: #FFF5E0; }
.tile-teal   { --tc: #0B8C78; --tcl: #E0F5F1; }
.tile-rose   { --tc: #C83050; --tcl: #FFEBEF; }
.tile-violet { --tc: #6B30CC; --tcl: #F2EEFF; }
.tile-green  { --tc: #1A8C4A; --tcl: #E4F7EC; }

.tile .tile-icon-wrap { background: var(--tcl); }
.tile:hover { background: var(--tcl); border-color: var(--tc); }
.tile:hover .tile-label { color: var(--tc); }

/* badge on tile */
.tile-badge {
  position: absolute; top: 12px; left: 12px;
  background: var(--rose-l); color: #fff;
  font-size: .65rem; font-weight: 800; min-width: 18px; height: 18px;
  border-radius: 9px; padding: 0 5px;
  display: none; align-items: center; justify-content: center;
}

/* ══════════════════════════════════════════
   INNER PAGES
══════════════════════════════════════════ */
.inner-page { display: none; animation: page-in .3s ease; }
.inner-page.active { display: block; }
@keyframes page-in {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* page header */
.page-hero {
  border-radius: 20px; padding: 22px 20px;
  margin-bottom: 18px; position: relative; overflow: hidden;
}
.page-hero h2 { font-size: 1.4rem; font-weight: 900; margin-bottom: 4px; }
.page-hero p  { font-size: .82rem; opacity: .85; }
.page-hero .hero-deco {
  position: absolute; left: -10px; top: 50%;
  transform: translateY(-50%);
  font-size: 5rem; opacity: .12;
  pointer-events: none;
}

/* ══════════════════════════════════════════
   SHARED COMPONENTS
══════════════════════════════════════════ */
.card {
  background: var(--card); border: 1.5px solid var(--border);
  border-radius: var(--r); padding: 18px;
  margin-bottom: 14px;
  box-shadow: var(--shadow);
}
.card-title {
  font-size: .88rem; font-weight: 800; color: var(--ink);
  display: flex; align-items: center; gap: 7px;
  margin-bottom: 14px;
}
.card-title .ct-icon {
  width: 28px; height: 28px; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: .85rem;
}

.inp {
  width: 100%; background: var(--cream); border: 1.5px solid var(--border);
  border-radius: var(--r-sm); color: var(--ink);
  padding: 11px 14px; font-size: .88rem;
  font-family: 'Tajawal', sans-serif;
  outline: none; transition: border-color .2s, box-shadow .2s;
  margin-bottom: 10px;
}
.inp:focus { border-color: var(--blue); box-shadow: 0 0 0 3px #2B4ECC1A; }
.inp::placeholder { color: var(--ink3); }
textarea.inp { resize: vertical; min-height: 80px; }

.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 7px;
  padding: 11px 20px; border-radius: var(--r-sm);
  font-weight: 800; font-size: .88rem; cursor: pointer;
  transition: all .2s; border: none; font-family: 'Tajawal', sans-serif;
}
.btn-ink { background: var(--ink); color: #fff; box-shadow: 0 4px 14px rgba(28,31,46,.25); }
.btn-ink:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(28,31,46,.3); }
.btn-outline {
  background: transparent; color: var(--ink2);
  border: 1.5px solid var(--border);
}
.btn-outline:hover { border-color: var(--ink); color: var(--ink); background: var(--cream2); }
.btn-full { width: 100%; }
.btn-sm { padding: 8px 14px; font-size: .8rem; }

.tag {
  display: inline-flex; align-items: center;
  padding: 3px 10px; border-radius: 20px;
  font-size: .72rem; font-weight: 700;
}

.divider { height: 1px; background: var(--border); margin: 16px 0; }
.empty {
  text-align: center; padding: 28px 16px; color: var(--ink3);
}
.empty .e-ico { font-size: 2.2rem; margin-bottom: 8px; }
.empty p { font-size: .85rem; }
.msg { font-size: .82rem; margin: 8px 0; }
.msg.ok  { color: var(--green); }
.msg.err { color: var(--rose); }

/* ══════════════════════════════════════════
   EXAMS
══════════════════════════════════════════ */
.exam-item {
  display: flex; align-items: center; gap: 13px;
  background: var(--card); border: 1.5px solid var(--border);
  border-radius: var(--r); padding: 14px 16px;
  margin-bottom: 10px; cursor: pointer; transition: all .2s;
}
.exam-item:hover { border-color: var(--ink); transform: translateX(-3px); box-shadow: var(--shadow); }
.exam-ico { width: 46px; height: 46px; border-radius: 13px; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; flex-shrink: 0; }
.exam-info { flex: 1; }
.exam-name { font-size: .95rem; font-weight: 800; }
.exam-meta { display: flex; gap: 6px; margin-top: 5px; flex-wrap: wrap; }
.exam-arr { color: var(--ink3); font-size: 1.1rem; }

.q-block {
  background: var(--cream); border: 1.5px solid var(--border);
  border-radius: 14px; padding: 14px; margin-bottom: 10px;
}
.q-num-badge {
  width: 26px; height: 26px; border-radius: 8px;
  display: inline-flex; align-items: center; justify-content: center;
  font-size: .78rem; font-weight: 800;
}
.q-text { font-size: .88rem; color: var(--ink2); line-height: 1.65; }

/* ══════════════════════════════════════════
   SCHEDULE / REMINDERS
══════════════════════════════════════════ */
.tt-accordion {
  background: var(--card); border: 1.5px solid var(--border);
  border-radius: var(--r); margin-bottom: 8px; overflow: hidden;
}
.tt-head {
  display: flex; align-items: center; justify-content: space-between;
  padding: 13px 16px; cursor: pointer; background: var(--card);
  transition: background .15s; user-select: none;
}
.tt-head:hover { background: var(--cream2); }
.tt-head h4 { font-size: .9rem; font-weight: 800; }
.tt-head .tt-chevron { color: var(--ink3); font-size: .8rem; transition: transform .2s; }
.tt-accordion.open .tt-head { background: var(--cream2); }
.tt-accordion.open .tt-chevron { transform: rotate(180deg); }
.tt-body { display: none; padding: 8px 16px 14px; border-top: 1px solid var(--border); }
.tt-accordion.open .tt-body { display: block; }
.tt-row {
  display: flex; align-items: center; gap: 10px;
  padding: 7px 0; border-bottom: 1px solid var(--border);
}
.tt-row:last-child { border: none; }
.tt-time { font-size: .78rem; font-weight: 700; color: var(--blue); width: 46px; font-family: 'JetBrains Mono', monospace; }
.tt-sub  { font-size: .86rem; flex: 1; }
.tt-dur  { font-size: .73rem; color: var(--ink3); }

.r-item {
  display: flex; align-items: center; gap: 10px;
  background: var(--card); border: 1.5px solid var(--border);
  border-right: 4px solid var(--gold);
  border-radius: var(--r); padding: 12px 14px;
  margin-bottom: 8px; transition: all .2s;
}
.r-item.done { border-right-color: var(--green); opacity: .7; }
.r-item:hover { box-shadow: var(--shadow); }
.r-info { flex: 1; }
.r-name { font-size: .9rem; font-weight: 700; }
.r-dt   { font-size: .75rem; color: var(--ink3); margin-top: 2px; }
.del-btn { background: none; border: none; cursor: pointer; color: var(--ink3); font-size: .9rem; padding: 3px; transition: color .2s; }
.del-btn:hover { color: var(--rose); }

/* ══════════════════════════════════════════
   MUSIC
══════════════════════════════════════════ */
.np-card {
  background: var(--ink); border-radius: 20px;
  padding: 22px; margin-bottom: 16px; text-align: center;
  position: relative; overflow: hidden;
}
.np-card::before {
  content: '';
  position: absolute; inset: 0;
  background: radial-gradient(ellipse 60% 60% at 50% 100%, #2B4ECC44, transparent);
}
.np-disk {
  width: 72px; height: 72px; border-radius: 50%;
  margin: 0 auto 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.8rem; position: relative; z-index: 1;
  animation: spin-disk 8s linear infinite; animation-play-state: paused;
}
.np-disk.active { animation-play-state: running; }
@keyframes spin-disk { to { transform: rotate(360deg); } }
.np-name { color: #fff; font-size: 1rem; font-weight: 800; position: relative; z-index: 1; }
.np-sub  { color: rgba(255,255,255,.55); font-size: .78rem; margin-top: 3px; position: relative; z-index: 1; }

.music-tile {
  display: flex; align-items: center; gap: 13px;
  background: var(--card); border: 1.5px solid var(--border);
  border-radius: var(--r); padding: 14px 16px;
  margin-bottom: 10px; cursor: pointer; transition: all .22s;
}
.music-tile:hover { transform: translateX(-3px); box-shadow: var(--shadow); }
.music-tile.playing { border-color: var(--ink); background: var(--cream2); }
.m-ico { width: 46px; height: 46px; border-radius: 13px; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; flex-shrink: 0; }
.m-info { flex: 1; }
.m-name { font-size: .92rem; font-weight: 800; }
.m-sub  { font-size: .75rem; color: var(--ink3); margin-top: 2px; }
.m-play { font-size: 1.4rem; color: var(--ink3); transition: color .2s; }
.music-tile:hover .m-play { color: var(--ink); }
.music-tile.playing .m-play { color: var(--blue); }

/* ══════════════════════════════════════════
   TIMER
══════════════════════════════════════════ */
.timer-tabs-row {
  display: flex; gap: 6px;
  background: var(--cream2); border-radius: 13px; padding: 4px;
  margin-bottom: 16px;
}
.t-tab {
  flex: 1; padding: 9px; border-radius: 10px;
  background: transparent; border: none;
  color: var(--ink3); font-weight: 800; font-size: .83rem;
  cursor: pointer; font-family: 'Tajawal', sans-serif; transition: all .2s;
}
.t-tab.active { background: var(--card); color: var(--ink); box-shadow: var(--shadow); }

.timer-face {
  background: var(--ink); border-radius: 22px;
  padding: 30px 20px 22px; text-align: center; margin-bottom: 14px;
  position: relative; overflow: hidden;
}
.timer-face::before {
  content: '';
  position: absolute; inset: 0;
  background: radial-gradient(ellipse 70% 50% at 50% 0%, #2B4ECC33, transparent);
}
.timer-digits {
  font-family: 'JetBrains Mono', monospace;
  font-size: 3.2rem; font-weight: 700;
  color: #fff; letter-spacing: 3px;
  position: relative; z-index: 1;
}
.timer-label { color: rgba(255,255,255,.4); font-size: .75rem; margin-top: 4px; position: relative; z-index: 1; }

.ring-wrap { display: flex; justify-content: center; margin-bottom: 14px; }
.ring-wrap svg { transform: rotate(-90deg); }
.r-bg   { fill: none; stroke: var(--border); stroke-width: 9; }
.r-fill { fill: none; stroke-width: 9; stroke-linecap: round; transition: stroke-dashoffset .6s ease; }

.ctrl-row { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
.ctrl {
  display: flex; align-items: center; gap: 6px;
  padding: 10px 20px; border-radius: var(--r-sm);
  font-weight: 800; font-size: .85rem;
  border: none; cursor: pointer; font-family: 'Tajawal', sans-serif; transition: all .18s;
}
.ctrl:hover { transform: translateY(-2px); }
.ctrl.play  { background: var(--green); color: #fff; }
.ctrl.pause { background: var(--rose); color: #fff; }
.ctrl.stop  { background: var(--cream2); color: var(--ink2); border: 1.5px solid var(--border); }
.ctrl.lap   { background: var(--teal); color: #fff; }
.ctrl.reset { background: var(--cream2); color: var(--ink2); border: 1.5px solid var(--border); }

.preset-wrap { display: flex; gap: 7px; flex-wrap: wrap; justify-content: center; margin-bottom: 12px; }
.preset {
  padding: 7px 13px; border-radius: 20px;
  background: var(--cream2); border: 1.5px solid var(--border);
  color: var(--ink2); font-weight: 700; font-size: .78rem;
  cursor: pointer; font-family: 'Tajawal', sans-serif; transition: all .18s;
}
.preset:hover { border-color: var(--gold); color: var(--gold); background: #FFF5E0; }

.ct-row { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 14px; }
.ct-inp {
  width: 76px; text-align: center;
  background: var(--cream2); border: 1.5px solid var(--border);
  border-radius: var(--r-sm); padding: 11px 6px;
  color: var(--ink); font-size: 1.15rem; font-family: 'JetBrains Mono', monospace;
  font-weight: 700; outline: none; transition: border-color .2s;
}
.ct-inp:focus { border-color: var(--gold); box-shadow: 0 0 0 3px #C8860A1A; }
.colon { font-size: 1.6rem; font-weight: 900; color: var(--ink3); }

.lap-row {
  display: flex; align-items: center; gap: 10px;
  padding: 7px 10px; border-radius: 9px; background: var(--cream2);
  margin-bottom: 4px;
}
.lap-n { font-size: .75rem; font-weight: 800; color: var(--teal); width: 18px; }
.lap-t { font-size: .84rem; font-family: 'JetBrains Mono', monospace; flex: 1; }
.laps-box { max-height: 140px; overflow-y: auto; }

/* ══════════════════════════════════════════
   NOTES
══════════════════════════════════════════ */
.note-card {
  background: var(--card); border: 1.5px solid var(--border);
  border-radius: var(--r); padding: 16px;
  margin-bottom: 10px; border-right: 4px solid transparent;
  transition: transform .2s, box-shadow .2s;
}
.note-card:hover { transform: translateX(-2px); box-shadow: var(--shadow); }
.note-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
.note-title  { font-size: .92rem; font-weight: 800; }
.note-date   { font-size: .7rem; color: var(--ink3); }
.note-body   { font-size: .84rem; color: var(--ink2); line-height: 1.65; }

/* ══════════════════════════════════════════
   MODAL
══════════════════════════════════════════ */
.overlay {
  position: fixed; inset: 0; z-index: 500;
  background: rgba(28,31,46,.5);
  display: none; align-items: flex-end; justify-content: center;
  backdrop-filter: blur(6px);
}
.overlay.open { display: flex; }
.modal {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 24px 24px 0 0; padding: 24px 22px 32px;
  width: 100%; max-width: 460px;
  animation: modal-up .25s ease;
  max-height: 80vh; overflow-y: auto;
}
@keyframes modal-up {
  from { transform: translateY(100%); opacity: 0; }
  to   { transform: translateY(0);    opacity: 1; }
}
.modal-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 16px; }
.modal h3 { font-size: 1rem; font-weight: 800; margin-bottom: 14px; }

/* ══════════════════════════════════════════
   TOAST
══════════════════════════════════════════ */
#toast-wrap {
  position: fixed; top: 62px; left: 50%; transform: translateX(-50%);
  z-index: 900; display: flex; flex-direction: column; gap: 6px;
  pointer-events: none; min-width: 260px;
}
.toast {
  padding: 11px 20px; border-radius: 12px;
  font-size: .85rem; font-weight: 700; text-align: center;
  box-shadow: var(--shadow-md);
  animation: t-in .3s ease, t-out .3s ease 2.7s forwards;
}
@keyframes t-in  { from { transform: translateY(-8px); opacity: 0; } to { opacity: 1; transform: none; } }
@keyframes t-out { to   { opacity: 0; } }
.toast.ok   { background: var(--ink); color: #fff; }
.toast.err  { background: var(--rose); color: #fff; }
.toast.warn { background: var(--gold); color: #fff; }
.toast.info { background: var(--blue); color: #fff; }

/* ══════════════════════════════════════════
   RESPONSIVE
══════════════════════════════════════════ */
@media (min-width: 480px) {
  .icon-grid { grid-template-columns: repeat(3, 1fr); }
}

/* ══════════════════════════════════════════
   TIMETABLE TABLE VIEW
══════════════════════════════════════════ */
.tt-view-toggle {
  display: flex; gap: 6px;
  background: var(--cream2); border-radius: 13px; padding: 4px;
  margin-bottom: 14px;
}
.tt-view-btn {
  flex: 1; padding: 8px; border-radius: 10px;
  background: transparent; border: none;
  color: var(--ink3); font-weight: 800; font-size: .82rem;
  cursor: pointer; font-family: 'Tajawal', sans-serif; transition: all .2s;
  display: flex; align-items: center; justify-content: center; gap: 5px;
}
.tt-view-btn.active { background: var(--card); color: var(--ink); box-shadow: var(--shadow); }

.tt-table-wrap { overflow-x: auto; margin-bottom: 14px; border-radius: var(--r); border: 1.5px solid var(--border); }
.tt-table {
  width: 100%; border-collapse: collapse;
  font-size: .82rem; min-width: 340px;
}
.tt-table thead tr { background: var(--ink); }
.tt-table thead th {
  color: #fff; padding: 10px 8px; font-weight: 800; text-align: center;
  font-size: .78rem; white-space: nowrap;
}
.tt-table thead th:first-child { border-radius: 0; }
.tt-table tbody tr:nth-child(even) { background: var(--cream2); }
.tt-table tbody tr:nth-child(odd)  { background: var(--card); }
.tt-table tbody tr.tt-today-row { background: var(--blue-bg) !important; }
.tt-table tbody td {
  padding: 9px 8px; text-align: center; border-bottom: 1px solid var(--border);
  vertical-align: middle;
}
.tt-table tbody td:first-child { font-weight: 800; color: var(--ink2); font-size: .78rem; white-space: nowrap; }
.tt-table .slot-cell {
  background: var(--card); border-radius: 8px; padding: 5px 7px;
  display: inline-block; min-width: 60px;
}
.tt-table .slot-cell .sc-name { font-weight: 700; color: var(--ink); font-size: .78rem; }
.tt-table .slot-cell .sc-time { color: var(--blue); font-size: .7rem; font-family: 'JetBrains Mono', monospace; }
.tt-table .slot-cell .sc-dur  { color: var(--ink3); font-size: .65rem; }
.tt-table .empty-cell { color: var(--ink3); font-size: .72rem; }

/* TIMETABLE EDITOR  */
.tt-editor-card {
  background: var(--card); border: 1.5px solid var(--border);
  border-radius: var(--r); margin-bottom: 10px; overflow: hidden;
  box-shadow: var(--shadow);
  transition: box-shadow .2s;
}
.tt-editor-card.open { box-shadow: var(--shadow-md); }

.tt-day-hdr {
  display: flex; align-items: center; justify-content: space-between;
  padding: 13px 16px; cursor: pointer;
  background: var(--card2); user-select: none;
  transition: background .15s;
}
.tt-day-hdr:hover { background: var(--cream3); }
.tt-day-hdr.is-today { background: #EEF1FF; }
.tt-day-hdr .day-left { display: flex; align-items: center; gap: 8px; }
.tt-day-hdr h4 { font-size: .92rem; font-weight: 800; }
.today-dot { width:8px;height:8px;border-radius:50%;background:var(--green);display:inline-block;flex-shrink:0; }
.today-pill {
  font-size:.67rem; font-weight:800; padding:2px 8px; border-radius:10px;
  background:#2B4ECC22; color:var(--blue); border:1px solid #2B4ECC44;
}
.tt-day-hdr .day-right { display:flex;align-items:center;gap:8px; }
.slot-count {
  font-size:.72rem; color:var(--ink3); font-weight:600;
  background:var(--cream); border:1px solid var(--border);
  border-radius:10px; padding:2px 9px;
}
.tt-chevron { font-size:.75rem; color:var(--ink3); transition:transform .22s; }
.tt-editor-card.open .tt-chevron { transform:rotate(180deg); }
.tt-day-body { display:none; border-top:1px solid var(--border); }
.tt-editor-card.open .tt-day-body { display:block; }
.tt-slots-list { padding:10px 14px 4px; }

/* each slot row */
.tt-slot-row {
  display:flex; align-items:center; gap:8px;
  padding:9px 12px; border-radius:11px;
  background:var(--cream); border:1.5px solid var(--border);
  margin-bottom:7px; transition:all .15s;
}
.tt-slot-row:hover { border-color:var(--blue); background:#EEF1FF88; }
.sl-time {
  font-family:'JetBrains Mono',monospace;
  font-size:.82rem; font-weight:700; color:var(--blue);
  min-width:48px; flex-shrink:0;
}
.sl-name { flex:1; font-size:.88rem; font-weight:600; color:var(--ink); }
.sl-dur  { font-size:.75rem; color:var(--ink3); flex-shrink:0; min-width:28px; text-align:center; }
.sl-actions { display:flex; gap:4px; flex-shrink:0; }
.sl-btn {
  width:30px;height:30px;border-radius:9px;border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:.8rem; transition:all .15s;
}
.sl-btn.edit { background:#EEF1FF; color:var(--blue); }
.sl-btn.edit:hover { background:var(--blue); color:#fff; }
.sl-btn.del  { background:#FFEBEF; color:var(--rose); }
.sl-btn.del:hover  { background:var(--rose); color:#fff; }
.no-slots { text-align:center; padding:14px; color:var(--ink3); font-size:.82rem; }

/* inline add form */
.tt-add-panel {
  margin:0 14px 12px; display:none;
  background:var(--cream2); border:1.5px dashed var(--border);
  border-radius:12px; padding:12px; animation:page-in .2s ease;
}
.tt-add-panel.show { display:block; }
.tt-add-row { display:flex; gap:8px; margin-bottom:8px; flex-wrap:wrap; }
.tt-inp {
  flex:1; min-width:80px;
  background:var(--cream); border:1.5px solid var(--border);
  border-radius:9px; padding:9px 12px;
  font-size:.84rem; color:var(--ink);
  font-family:'Tajawal',sans-serif; outline:none;
  transition:border-color .2s, box-shadow .2s;
}
.tt-inp:focus { border-color:var(--blue); box-shadow:0 0 0 2px #2B4ECC1A; }
.tt-inp::placeholder { color:var(--ink3); }
.tt-inp.small { max-width:110px; }
.tt-form-btns { display:flex; gap:8px; }
.tt-save-btn {
  flex:1; padding:9px; border-radius:9px; border:none; cursor:pointer;
  background:var(--ink); color:#fff;
  font-weight:800; font-size:.84rem; font-family:'Tajawal',sans-serif;
  transition:all .2s;
}
.tt-save-btn:hover { background:var(--blue); }
.tt-cancel-btn {
  padding:9px 14px; border-radius:9px; cursor:pointer;
  background:transparent; color:var(--ink3);
  border:1.5px solid var(--border); font-size:.84rem;
  font-family:'Tajawal',sans-serif; transition:all .2s;
}
.tt-cancel-btn:hover { border-color:var(--rose); color:var(--rose); }

/* ＋ add row button */
.tt-addrow-btn {
  display:flex; align-items:center; justify-content:center; gap:6px;
  width:100%; padding:9px 14px 12px;
  background:none; border:none; cursor:pointer;
  color:var(--ink3); font-size:.82rem; font-weight:700;
  font-family:'Tajawal',sans-serif; transition:color .2s;
}
.tt-addrow-btn:hover { color:var(--blue); }
.tt-addrow-btn svg { transition:transform .2s; }
.tt-addrow-btn:hover svg { transform:rotate(90deg); }

/* EDIT MODAL */
.edit-overlay {
  position:fixed;inset:0;z-index:700;
  background:rgba(28,31,46,.55);backdrop-filter:blur(5px);
  display:none;align-items:center;justify-content:center;padding:20px;
}
.edit-overlay.open { display:flex; }
.edit-modal {
  background:var(--card); border:1.5px solid var(--border);
  border-radius:20px; padding:24px; width:100%; max-width:360px;
  box-shadow:var(--shadow-lg); animation:page-in .22s ease;
}
.edit-modal h3 { font-size:1rem; font-weight:800; margin-bottom:16px; color:var(--ink); }
.em-field { margin-bottom:10px; }
.em-label { font-size:.78rem;color:var(--ink3);font-weight:700;display:block;margin-bottom:4px; }
.em-inp {
  width:100%; background:var(--cream); border:1.5px solid var(--border);
  border-radius:10px; padding:10px 13px;
  font-size:.9rem; color:var(--ink); font-family:'Tajawal',sans-serif;
  outline:none; transition:border-color .2s;
}
.em-inp:focus { border-color:var(--blue); box-shadow:0 0 0 3px #2B4ECC1A; }
.em-actions { display:flex; gap:8px; margin-top:14px; }
.em-save {
  flex:1; padding:11px; border-radius:10px; border:none; cursor:pointer;
  background:var(--ink); color:#fff; font-weight:800; font-size:.9rem;
  font-family:'Tajawal',sans-serif; transition:all .2s;
}
.em-save:hover { background:var(--blue); transform:translateY(-1px); }
.em-cancel {
  padding:11px 16px; border-radius:10px; cursor:pointer;
  background:transparent; color:var(--ink3);
  border:1.5px solid var(--border); font-size:.9rem;
  font-family:'Tajawal',sans-serif; transition:all .2s;
}
.em-cancel:hover { border-color:var(--rose); color:var(--rose); }

/* ══════════════════════════════════════════
   SETTINGS PAGE
══════════════════════════════════════════ */
.settings-section {
  background: var(--card); border: 1.5px solid var(--border);
  border-radius: 18px; margin-bottom: 14px; overflow: hidden;
  box-shadow: var(--shadow);
}
.settings-section-title {
  font-size: .72rem; font-weight: 800; color: var(--ink3);
  letter-spacing: 1px; text-transform: uppercase;
  padding: 14px 16px 6px;
}

/* social links */
.social-links {
  display: flex; gap: 12px; padding: 16px;
}
.social-btn {
  flex: 1; display: flex; align-items: center; justify-content: center; gap: 9px;
  padding: 13px 10px; border-radius: 14px; border: none; cursor: pointer;
  font-family: 'Tajawal', sans-serif; font-size: .88rem; font-weight: 800;
  text-decoration: none; transition: transform .18s, box-shadow .18s, opacity .18s;
}
.social-btn:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(0,0,0,.15); }
.social-btn:active { transform: scale(.97); }
.social-btn-ig {
  background: linear-gradient(135deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
  color: #fff;
}
.social-btn-fb {
  background: #1877F2; color: #fff;
}
.social-btn svg { flex-shrink: 0; }



.settings-row {
  display: flex; align-items: center; gap: 12px;
  padding: 13px 16px; border-bottom: 1px solid var(--border);
  transition: background .15s;
}
.settings-row:last-child { border-bottom: none; }
.settings-row:hover { background: var(--cream2); }
.sr-icon {
  width: 36px; height: 36px; border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1rem; flex-shrink: 0;
}
.sr-info { flex: 1; }
.sr-title { font-size: .9rem; font-weight: 700; color: var(--ink); }
.sr-sub   { font-size: .75rem; color: var(--ink3); margin-top: 1px; }
/* toggle switch */
.toggle-wrap { position: relative; width: 46px; height: 26px; flex-shrink: 0; }
.toggle-wrap input { opacity: 0; width: 0; height: 0; }
.toggle-slider {
  position: absolute; inset: 0;
  background: var(--border); border-radius: 13px; cursor: pointer;
  transition: background .2s;
}
.toggle-slider::before {
  content: ''; position: absolute;
  width: 20px; height: 20px; border-radius: 50%;
  background: #fff; top: 3px; right: 3px;
  transition: transform .2s;
  box-shadow: 0 1px 4px rgba(0,0,0,.2);
}
.toggle-wrap input:checked + .toggle-slider { background: var(--blue); }
.toggle-wrap input:checked + .toggle-slider::before { transform: translateX(-20px); }
/* lang buttons */
.lang-btns { display: flex; gap: 6px; flex-wrap: wrap; }
.lang-btn {
  padding: 6px 13px; border-radius: 20px; font-size: .8rem; font-weight: 700;
  border: 1.5px solid var(--border); background: transparent; cursor: pointer;
  color: var(--ink2); font-family: inherit; transition: all .18s;
}
.lang-btn:hover { border-color: var(--blue); color: var(--blue); }
.lang-btn.active { background: var(--blue); color: #fff; border-color: var(--blue); }
/* danger zone */
.danger-btn {
  width: 100%; padding: 12px; border-radius: 12px; border: none; cursor: pointer;
  background: #FFEBEF; color: var(--rose); font-weight: 800; font-size: .88rem;
  font-family: inherit; transition: all .2s; margin-bottom: 8px;
  border: 1.5px solid #FFCCD6;
}
.danger-btn:hover { background: var(--rose); color: #fff; }
</style>
</head>

// ════════════════════════════════════════════════════
//  STORAGE
// ════════════════════════════════════════════════════
const S = {
  get: (k, d={}) => { try { return JSON.parse(localStorage.getItem(k)) ?? d; } catch { return d; } },
  set: (k,v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} }
};
let CU = null; // current user

// ════════════════════════════════════════════════════
//  AUTH
// ════════════════════════════════════════════════════
let authMode = 'login';

// ── Auto-fill remembered credentials on load ──
(function loadRemembered() {
  const saved = S.get('remembered_user', null);
  if (saved && saved.u) {
    document.getElementById('a-user').value = saved.u;
    document.getElementById('a-pass').value = saved.p || '';
    document.getElementById('remember-me').checked = true;
  }
})();

function toggleEye() {
  const p = document.getElementById('a-pass');
  p.type = p.type==='password' ? 'text' : 'password';
}
function toggleAuthMode() {
  authMode = authMode==='login' ? 'signup' : 'login';
  const s = authMode==='signup';
  document.getElementById('auth-heading').textContent = s ? 'Create a new account' : 'Log in';
  document.getElementById('auth-btn-lbl').textContent = s ? 'Create account' : 'Log in';
  document.getElementById('auth-switch').textContent = s ? 'Already have an account? Log in' : 'Don\'t have an account? Create one!';
  const rmRow = document.getElementById('remember-me')?.closest('div');
  if(rmRow) rmRow.style.display = s ? 'none' : 'flex';
  setMsg('');
}
function setMsg(t, cls='') {
  const el = document.getElementById('auth-msg');
  el.textContent = t; el.className = `auth-msg ${cls}`;
}
function authSubmit() {
  const u = document.getElementById('a-user').value.trim();
  const p = document.getElementById('a-pass').value.trim();
  if (!u||!p) { setMsg('Please fill in all fields','err'); return; }
  const users = S.get('users', {});
  if (authMode==='signup') {
    if (users[u]) { setMsg('The username is taken.','err'); return; }
    users[u] = { pw: p, joined: Date.now() };
    S.set('users', users);
    setMsg('✅ Account created! Please log in.','ok');
    toggleAuthMode();
  } else {
    if (!users[u] || users[u].pw !== p) { setMsg('❌ Invalid credentials','err'); return; }
    // handle remember me
    const rememberMe = document.getElementById('remember-me').checked;
    if (rememberMe) {
      S.set('remembered_user', { u, p });
    } else {
      S.set('remembered_user', null);
    }
    CU = u; startApp();
  }
}
document.getElementById('a-pass').addEventListener('keydown', e => { if(e.key==='Enter') authSubmit(); });
document.getElementById('a-user').addEventListener('keydown', e => { if(e.key==='Enter') authSubmit(); });

function startApp() {
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('main-app').style.display = 'flex';
  // load prefs
  const prefs = S.get(`prefs_${CU}`, {lang:'ar', dark:false});
  applyLang(prefs.lang, false);
  applyDark(prefs.dark, false);
  refreshHomeHeader();
  updateNotifBadge(); updateNoteCount();
  startNotifDaemon();
  if ('Notification' in window && Notification.permission==='default') Notification.requestPermission();
}

let curLang = 'ar';

function t(key) { return (LANGS[curLang]||LANGS.ar)[key] || key; }

function applyLang(lang, save=true) {
  curLang = lang;
  const L = LANGS[lang] || LANGS.ar;
  // dir + lang
  document.getElementById('html-root').setAttribute('lang', L.code);
  document.getElementById('html-root').setAttribute('dir', L.dir);
  document.body.className = document.body.className.replace(/lang-\w+/,'') + ` lang-${lang}`;
  // update all data-i18n elements
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const k = el.getAttribute('data-i18n');
    if(LANGS[lang] && LANGS[lang][k]) el.textContent = LANGS[lang][k];
  });
  // breadcrumb home label
  const bchl = document.getElementById('bc-home-lbl');
  if(bchl) bchl.textContent = t('back');
  // refresh home header text
  const gr = document.getElementById('home-greeting');
  if(gr) gr.textContent = t('home_greeting');
  // re-render current page when language changes
  if(save && currentPage) {
    const renders = {exams:renderExams, schedule:renderSchedule, music:renderMusic,
                     timer:renderTimer, notes:renderNotes, quran:renderQuran,
                     timetable:renderTimetable, settings:renderSettings};
    const pg = document.getElementById('page-'+currentPage);
    if(pg && renders[currentPage]) renders[currentPage](pg);
  } else if(currentPage==='settings') {
    const pg=document.getElementById('page-settings');
    if(pg) renderSettings(pg);
  }
  // update home quick strip i18n labels
  const qs = document.getElementById('quick-strip');
  if(qs) {
    const btns = qs.querySelectorAll('.qs-item');
    const qsLabels = ['exams','timetable','schedule','timer','notes','music'];
    const qsIcons  = ['📄','🗓️','⏰','⏱','📝','🎵'];
    btns.forEach((b,i) => {
      if(qsLabels[i]) b.innerHTML = `<span class="qs-icon">${qsIcons[i]}</span> ${t(qsLabels[i])}`;
    });
  }
  // update icon grid tile labels
  const tileLabelMap = {
    exams:'exams', timetable:'timetable', music:'music',
    timer:'timer', notes:'notes', schedule:'schedule_tile'
  };
  const tileSubs = {
    exams:'exams_sub', timetable:'timetable_sub', music:'music_sub',
    timer:'timer_sub', notes:'notes_tile_sub', schedule:'schedule_sub'
  };
  Object.keys(tileLabelMap).forEach(page => {
    const tile = document.querySelector(`.tile[onclick="openPage('${page}')"]`);
    if(tile) {
      const lbl = tile.querySelector('.tile-label');
      const sub = tile.querySelector('.tile-sub');
      if(lbl) lbl.textContent = t(tileLabelMap[page]);
      if(sub) sub.textContent = t(tileSubs[page]);
    }
  });
  // update topbar title & breadcrumb if on a page
  if(currentPage && currentPage !== 'settings') {
    const PAGE_LABELS_KEY = {
      exams:'exams_page_title', schedule:'schedule_page_title',
      timetable:'tt_page_title', music:'music_page_title',
      timer:'timer_page_title', notes:'notes_page_title',
      quran:'quran_page_title'
    };
    const lbl = t(PAGE_LABELS_KEY[currentPage] || currentPage);
    const tbt = document.getElementById('topbar-title');
    if(tbt) tbt.textContent = lbl;
    const bcl = document.getElementById('bc-label');
    if(bcl) bcl.textContent = lbl;
  }
  // refresh home header date
  refreshHomeHeader();
  if(save) {
    const p = S.get(`prefs_${CU}`,{}); p.lang=lang; S.set(`prefs_${CU}`,p);
  }
}

function applyDark(on, save=true) {
  if(on) document.body.classList.add('dark');
  else document.body.classList.remove('dark');
  if(save) {
    const p = S.get(`prefs_${CU}`,{}); p.dark=on; S.set(`prefs_${CU}`,p);
  }
}

function toggleDark() {
  const on = document.body.classList.contains('dark');
  applyDark(!on);
  // update toggle in settings page if open
  const tog = document.getElementById('dark-toggle');
  if(tog) tog.checked = !on;
}

function refreshHomeHeader() {
  const d = new Date();
  const dayNames = DAYS_TRANS[curLang] || DAYS_TRANS.ar;
  const el = document.getElementById('home-date');
  if(el) el.textContent = `${dayNames[d.getDay()]}، ${d.toLocaleDateString(curLang==='ar'?'ar-DZ':curLang==='fr'?'fr-FR':'en-GB',{day:'numeric',month:'long',year:'numeric'})}`;
  const gr = document.getElementById('home-greeting');
  if(gr) gr.textContent = t('home_greeting');
  document.getElementById('home-name').textContent = CU;
}

  exams:'exams', schedule:'schedule',

};
let currentPage = null;

function openPage(name) {
  document.getElementById('home-screen').style.display = 'none';
  document.getElementById('inner-pages').style.display = 'block';
  document.querySelectorAll('.inner-page').forEach(p => p.classList.remove('active'));
  const el = document.getElementById('page-'+name);
  el.classList.add('active');
  // breadcrumb
  document.getElementById('breadcrumb').classList.add('visible');
  const lbl = t(PAGE_LABELS_KEY[name] || name);
  document.getElementById('bc-label').textContent = lbl;
  document.getElementById('topbar-title').textContent = lbl;
  // show back button in appbar
  document.getElementById('tb-back').classList.add('visible');
  currentPage = name;
  // render
  const renders = {exams:renderExams, schedule:renderSchedule, music:renderMusic,
                   timer:renderTimer, notes:renderNotes, quran:renderQuran,
                   timetable:renderTimetable, settings:renderSettings};
  if (renders[name]) renders[name](el);
  window.scrollTo(0,0);
}

function goHome() {
  document.getElementById('home-screen').style.display = 'block';
  document.getElementById('inner-pages').style.display = 'none';
  document.getElementById('breadcrumb').classList.remove('visible');
  document.getElementById('topbar-title').textContent = 'Salmi';
  document.getElementById('tb-back').classList.remove('visible');
  currentPage = null;
  updateNoteCount(); updateNotifBadge();
  if (swRunning) swToggle();
}

function toast(msg, type='ok') {
  const w = document.getElementById('toast-wrap');
  const t = document.createElement('div');
  t.className = `toast ${type}`; t.textContent = msg;
  w.appendChild(t); setTimeout(()=>t.remove(), 3200);
}

function openNotifModal() {
  const reminders = getRem();
  const now = new Date();
  const up = reminders.filter(r=>!r.notified && new Date(r.raw)>now)
    .sort((a,b)=>a.raw.localeCompare(b.raw));
  const el = document.getElementById('notif-list');
  if (!up.length) {
    el.innerHTML = `<div class="empty"><div class="e-ico">🔕</div><p>${t('no_upcoming')}</p></div>`;
  } else {
    el.innerHTML = up.map(r=>`
      <div class="r-item" style="margin-bottom:8px">
        <span style="font-size:1.1rem">⏰</span>
        <div class="r-info">
          <div class="r-name">${r.lesson}</div>
          <div class="r-dt">${r.display}</div>
        </div>
      </div>`).join('');
  }
  document.getElementById('notif-overlay').classList.add('open');
}
function closeModal() {
  document.getElementById('notif-overlay').classList.remove('open');
}
document.getElementById('notif-overlay').addEventListener('click', e => {
  if (e.target===document.getElementById('notif-overlay')) closeModal();
});
function updateNotifBadge() {
  const count = getRem().filter(r=>!r.notified).length;
  const b = document.getElementById('n-badge');
  const tb = document.getElementById('badge-remind');
  if (count > 0) {
    b.style.display = 'flex'; b.textContent = count;
    if(tb){tb.style.display='flex';tb.textContent=count;}
  } else {
    b.style.display = 'none';
    if(tb) tb.style.display='none';
  }
}
function updateNoteCount() {
  const n = getNotes().length;
  const el = document.getElementById('notes-count');
  if(el) el.textContent = n + ' ';
}

// ════════════════════════════════════════════════════
function startNotifDaemon() {
  setInterval(() => {
    const now = new Date(); const rem = getRem(); let ch = false;
    rem.forEach(r => {
      if(r.notified) return;
      const dt = new Date(r.raw); const diff=(dt-now)/1000;
      if(diff>=0 && diff<=20) {
        r.notified=true; ch=true;
        toast(`⏰ حان وقت مراجعة: ${r.lesson}`, 'warn');
        if('Notification' in window && Notification.permission==='granted')
          new Notification('⏰ Salmi',{body:`حان وقت مراجعة: ${r.lesson}`});
      }
    });
    if(ch){saveRem(rem);updateNotifBadge();}
  }, 15000);
}

  fr: ['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'],

  return (DAYS_TRANS[curLang] || DAYS_TRANS.ar)[idx];
}

};

  const saved = S.get(`tt_${CU}`, null);

  return JSON.parse(JSON.stringify(TT_DEFAULT));
}

// ── Edit modal state ──
let _eDay=null, _eIdx=null;

function openEditSlot(di, idx) {
  const day = ALL_DAYS[di];
  _eDay=day; _eIdx=idx;
  const tt=getTT(), s=tt[day][idx];
  document.getElementById('em-time').value = s[0] || '';
  document.getElementById('em-name').value = s[1] || '';
  document.getElementById('em-dur').value  = s[2] || '';
  // update modal labels with current lang
  const modal = document.getElementById('edit-overlay').querySelector('.edit-modal');
  if(modal) {
    modal.querySelector('h3').textContent = t('tt_edit_title');
    const labels = modal.querySelectorAll('.em-label');
    if(labels[0]) labels[0].textContent = t('tt_edit_time');
    if(labels[1]) labels[1].textContent = t('tt_edit_name');
    if(labels[2]) labels[2].textContent = t('tt_edit_dur');
    const saveBtn = modal.querySelector('.em-save');
    if(saveBtn) saveBtn.textContent = t('tt_save_edit');
    const cancelBtn = modal.querySelector('.em-cancel');
    if(cancelBtn) cancelBtn.textContent = t('tt_cancel');
  }
  document.getElementById('edit-overlay').classList.add('open');
}
function closeEditModal() {
  document.getElementById('edit-overlay').classList.remove('open');
  _eDay=null; _eIdx=null;
}
function saveEditSlot() {
  const t = document.getElementById('em-time').value.trim();
  const n = document.getElementById('em-name').value.trim();
  const d = document.getElementById('em-dur').value.trim() || '--';
  if(!n){ toast(' أدخل اسم المادة','err'); return; }
  const tt=getTT();
  tt[_eDay][_eIdx] = [t||'--:--', n, d];
  tt[_eDay].sort((a,b)=>a[0].localeCompare(b[0]));
  saveTT(tt);
  closeEditModal();
  const pg=document.getElementById('page-timetable');
  if(pg && pg.classList.contains('active')) renderTimetable(pg);
}
document.getElementById('edit-overlay').addEventListener('click', e=>{
  if(e.target===document.getElementById('edit-overlay')) closeEditModal();
});

// ── Add slot ──
function addSlot(di) {
  const day = ALL_DAYS[di];
  const timeVal = (document.getElementById(`fi-t-${di}`)?.value||'').trim();
  const n = (document.getElementById(`fi-n-${di}`)?.value||'').trim();
  const d = (document.getElementById(`fi-d-${di}`)?.value||'').trim() || '--';
  if(!n){ toast('⚠️ ' + t('tt_name_ph').replace(' ✱',''), 'err'); return; }
  const tt=getTT();
  if(!tt[day]) tt[day]=[];
  tt[day].push([timeVal||'--:--', n, d]);
  tt[day].sort((a,b)=>a[0].localeCompare(b[0]));
  saveTT(tt);
  ['fi-t-','fi-n-','fi-d-'].forEach(p=>{ const el=document.getElementById(p+di); if(el) el.value=''; });
  document.getElementById(`add-panel-${di}`)?.classList.remove('show');
  const pg=document.getElementById('page-timetable');
  if(pg) renderTimetable(pg);
  toast(`✅ ${n} ← ${dayLabel(day)}`, 'ok');
}

// ── Delete slot ──
function deleteSlot(di, idx) {
  const day = ALL_DAYS[di];
  const tt=getTT();
  tt[day].splice(idx,1);
  saveTT(tt);
  const pg=document.getElementById('page-timetable');
  if(pg) renderTimetable(pg);
}

// ── Reset to defaults ──
function resetTT() {
  if(!confirm(t('confirm_reset_tt'))) return;
  saveTT(JSON.parse(JSON.stringify(TT_DEFAULT)));
  const pg=document.getElementById('page-timetable');
  if(pg) renderTimetable(pg);
  toast(t('tt_reset_btn'),'info');
}

  const buildTableView = () => {

    if (!allTimes.length) return `<div class="empty"><div class="e-ico">🗓️</div><p>${t('tt_no_slots')}</p></div>`;

      const isAnyToday = (tt[todayName]||[]).some(s=>s[0]===time);

        const slot = (tt[day]||[]).find(s=>s[0]===time);

    }).join('');

  };

              </button>
              <button class="sl-btn del" onclick="deleteSlot(${di},${i})">
                <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
              </button>
            </div>
          </div>`).join('')
      : `<div class="no-slots">${t('tt_no_slots')}</div>`;
    return `
      <div class="tt-editor-card ${isToday?'open':''}" id="ttc-${di}">
        <div class="tt-day-hdr ${isToday?'is-today':''}" onclick="document.getElementById('ttc-${di}').classList.toggle('open')">
          <div class="day-left">
            ${isToday?'<span class="today-dot"></span>':''}
            <h4>${dayLabel(day)}</h4>
            ${isToday?`<span class="today-pill">${t('tt_today')}</span>`:''}
          </div>
          <div class="day-right">
            <span class="slot-count">${slots.length} ${t('tt_sessions')}</span>
            <span class="tt-chevron">▼</span>
          </div>
        </div>
        <div class="tt-day-body">
          <div class="tt-slots-list">${slotsHTML}</div>
          <div class="tt-add-panel" id="add-panel-${di}">
            <div class="tt-add-row">
              <input class="tt-inp small" id="fi-t-${di}" type="time" placeholder="${t('tt_time_ph')}">
              <input class="tt-inp" id="fi-n-${di}" placeholder="${t('tt_name_ph')}">

              <input class="tt-inp small" id="fi-d-${di}" placeholder="${t('tt_dur_ph')}">

              <button class="tt-save-btn" onclick="addSlot(${di})">${t('tt_save_slot')}</button>
              <button class="tt-cancel-btn" onclick="document.getElementById('add-panel-${di}').classList.remove('show')">${t('tt_cancel')}</button>

            <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            ${t('tt_add_slot')}
          </button>
        </div>
      </div>`;
  }).join('');

  el.innerHTML = `
    <div class="page-hero" style="background:#EEF1FF;color:#2B4ECC">
      <div class="hero-deco">🗓</div>

               font-family:'Tajawal',sans-serif;transition:all .2s"

function renderRList() {
  const el = document.getElementById('rlist'); if(!el) return;
  const rem = getRem();
  if(!rem.length) { el.innerHTML=`<div class="empty"><div class="e-ico">📭</div><p>${t('no_reminders')}</p></div>`; return; }
  el.innerHTML = [...rem].reverse().map((r,ri)=>`
    <div class="r-item ${r.notified?'done':''}">
      <span style="font-size:1.1rem">${r.notified?'✅':'⏰'}</span>
      <div class="r-info">
        <div class="r-name">${r.lesson}</div>
        <div class="r-dt">${r.display}${r.notified?' • <span style="color:var(--green)">تمّت</span>':''}</div>
      </div>
      <button class="del-btn" onclick="delReminder(${rem.length-1-ri})">🗑</button>

function addReminder() {
  const lesson = document.getElementById('r-lesson')?.value.trim();
  const raw    = document.getElementById('r-dt')?.value;
  const msg    = document.getElementById('r-msg');
  if(!lesson||!raw){if(msg){msg.textContent=t('fill_fields');msg.className='msg err';}return;}
  const dt = new Date(raw);
  if(dt<=new Date()){if(msg){msg.textContent=t('future_time');msg.className='msg err';}return;}
  const rem = getRem();
  rem.push({
    lesson, raw,
    display: dt.toLocaleString('ar-DZ',{year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}),
    notified: false
  });
  saveRem(rem);
  if(document.getElementById('r-lesson')) document.getElementById('r-lesson').value='';
  if(document.getElementById('r-dt')) document.getElementById('r-dt').value='';
  if(msg){msg.textContent=` تمت الإضافة: ${lesson}`;msg.className='msg ok';}
  renderRList(); updateNotifBadge();
  toast(`تمت إضافة تذكير: ${lesson}`,'ok');
}
function delReminder(idx) {
  const rem = getRem(); rem.splice(idx,1); saveRem(rem);
  renderRList(); updateNotifBadge();
}

// stopwatch
function swFmt(ms) {
  const s=Math.floor(ms/1000),h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sc=s%60,ds=Math.floor((ms%1000)/100);
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(sc).padStart(2,'0')}.${ds}`;
}
function swToggle() {
  const btn=document.getElementById('sw-btn'); if(!btn) return;
  if(!swRunning) {
    swRunning=true; swStart=Date.now()-swElapsed;
    swInt=setInterval(()=>{
      swElapsed=Date.now()-swStart;
      const d=document.getElementById('sw-d'); if(d) d.textContent=swFmt(swElapsed);
    },100);
    btn.textContent='⏸ وقف'; btn.className='ctrl pause';
  } else {
    swRunning=false; clearInterval(swInt);
    btn.textContent='▶ ابدأ'; btn.className='ctrl play';
  }
}
function swLap() {
  if(!swRunning&&swElapsed===0) return;
  const t=swFmt(swElapsed); const n=swLaps.length+1; swLaps.unshift(t);
  const lb=document.getElementById('laps-box'); if(!lb) return;
  lb.innerHTML=swLaps.map((lt,i)=>`
    <div class="lap-row">
      <span class="lap-n">${swLaps.length-i}</span>
      <span class="lap-t">${lt}</span>
    </div>`).join('');
}
function swReset() {
  swRunning=false; clearInterval(swInt); swElapsed=0; swLaps=[];
  const d=document.getElementById('sw-d'); if(d) d.textContent='00:00:00.0';
  const b=document.getElementById('sw-btn'); if(b){b.textContent='▶ ابدأ';b.className='ctrl play';}
  const lb=document.getElementById('laps-box'); if(lb) lb.innerHTML='<div class="empty" style="padding:10px"><p>لا توجد دورات</p></div>';
}

// countdown
function ctFmt(s) {
  const h = Math.floor(s/3600);
  const m = Math.floor((s%3600)/60);
  const sc = s%60;
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(sc).padStart(2,'0')}`;
}
function updateRing() {
  const ring=document.getElementById('ct-ring'); if(!ring) return;
  const r=78,circ=2*Math.PI*r,pct=ctTotal>0?ctRem/ctTotal:1;
  ring.style.strokeDashoffset=circ*(1-pct);
}
function ctStart() {
  if(ctRunning) return;
  const h=parseInt(document.getElementById('ct-hr')?.value||0);
  const m=parseInt(document.getElementById('ct-min')?.value||0);
  const s=parseInt(document.getElementById('ct-sec')?.value||0);
  if(!ctRem){ctRem=h*3600+m*60+s;ctTotal=ctRem;}
  if(ctRem<=0) return;
  ctRunning=true;
  const lbl=document.getElementById('ct-lbl'); if(lbl) lbl.textContent='';
  ctInt=setInterval(()=>{
    ctRem--;
    const d=document.getElementById('ct-d'); if(d) d.textContent=ctFmt(ctRem);
    updateRing();
    if(ctRem<=0){
      ctRunning=false; clearInterval(ctInt);
      const lbl2=document.getElementById('ct-lbl'); if(lbl2) lbl2.textContent='';
      toast(' انتهت الجلسة! خذ استراحة.','warn');
      if('Notification' in window && Notification.permission==='granted')
        new Notification(' Salmi',{body:'انتهت جلسة الدراسة!'});
    }
  },1000);
}
function ctStop() {
  ctRunning=false; clearInterval(ctInt);
  const lbl=document.getElementById('ct-lbl'); if(lbl) lbl.textContent='⏸ متوقف';
}
function ctReset() {
  ctRunning=false; clearInterval(ctInt); ctRem=0; ctTotal=0;
  const d=document.getElementById('ct-d'); if(d) d.textContent='00:00:00';
  const lbl=document.getElementById('ct-lbl'); if(lbl) lbl.textContent='';
  const ring=document.getElementById('ct-ring'); if(ring) ring.style.strokeDashoffset=0;
}
function setPreset(h, m, s) {
  ctRunning=false; clearInterval(ctInt);
  ctRem = h*3600 + m*60 + s;
  ctTotal = ctRem;
  const d=document.getElementById('ct-d'); if(d) d.textContent=ctFmt(ctRem);
  const hi=document.getElementById('ct-hr');  if(hi) hi.value=h;
  const mi=document.getElementById('ct-min'); if(mi) mi.value=m;
  const si=document.getElementById('ct-sec'); if(si) si.value=String(s).padStart(2,'0');
  const ring=document.getElementById('ct-ring'); if(ring) ring.style.strokeDashoffset=0;
  const lbl=document.getElementById('ct-lbl'); if(lbl) lbl.textContent='';
}

function renderNList() {
  const el=document.getElementById('notes-list'); if(!el) return;
  const notes=getNotes();
  if(!notes.length){el.innerHTML=`<div class="empty"><div class="e-ico">🗒️</div><p>${t('no_notes')}</p></div>`;return;}
  el.innerHTML=[...notes].reverse().map((n,ri)=>{
    const ci=(notes.length-1-ri)%NC.length;
    return `
      <div class="note-card" style="border-right-color:${NC[ci]}">
        <div class="note-header">
          <div class="note-title">${n.title}</div>
          <div style="display:flex;align-items:center;gap:6px">
            <span class="note-date">${n.date}</span>
            <button class="del-btn" onclick="delNote(${notes.length-1-ri})">🗑</button>
          </div>
        </div>
        <div class="note-body">${n.body}</div>
      </div>`; }).join('');
}
function addNote() {
  const title=document.getElementById('n-title')?.value.trim();
  const body=document.getElementById('n-body')?.value.trim();
  const msg=document.getElementById('n-msg');
  if(!title||!body){if(msg){msg.textContent=t('note_fill');msg.className='msg err';}return;}
  const notes=getNotes();
  notes.push({title,body,date:new Date().toLocaleDateString(curLang==='ar'?'ar-DZ':curLang==='fr'?'fr-FR':'en-GB')});
  saveNotes(notes);
  if(document.getElementById('n-title')) document.getElementById('n-title').value='';
  if(document.getElementById('n-body')) document.getElementById('n-body').value='';
  if(msg){msg.textContent=t('note_added');msg.className='msg ok';}
  renderNList(); updateNoteCount();
  toast(' تمت إضافة الملاحظة','ok');
}
function delNote(idx) {
  const notes=getNotes(); notes.splice(idx,1); saveNotes(notes);
  renderNList(); updateNoteCount();
}
